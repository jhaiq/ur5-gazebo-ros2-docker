controller_names:
  - joint_trajectory_controller

joint_trajectory_controller:
  type: FollowJointTrajectory
  joints:
    - shoulder_pan_joint
    - shoulder_lift_joint
    - elbow_joint
    - wrist_1_joint
    - wrist_2_joint
    - wrist_3_joint
  
  state_publish_rate: 50.0
  action_monitor_rate: 20.0
  
  constraints:
    goal_time: 0.6
    shoulder_pan_joint:
      trajectory: 0.2
      goal: 0.1
    shoulder_lift_joint:
      trajectory: 0.2
      goal: 0.1
    elbow_joint:
      trajectory: 0.2
      goal: 0.1
    wrist_1_joint:
      trajectory: 0.2
      goal: 0.1
    wrist_2_joint:
      trajectory: 0.2
      goal: 0.1
    wrist_3_joint:
      trajectory: 0.2
      goal: 0.1
