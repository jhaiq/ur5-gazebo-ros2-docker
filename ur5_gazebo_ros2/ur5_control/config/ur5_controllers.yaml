controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 100  # Hz
    interfaces:
      - position
      - velocity

joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    
    command_interfaces:
      - position
      - velocity
    
    state_interfaces:
      - position
      - velocity
    
    state_publish_rate: 50.0  # Hz
    action_monitor_rate: 20.0  # Hz
    
    allow_partial_joints_goal: false
    
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      
      shoulder_pan_joint:
        trajectory: 0.2
        goal: 0.1
      shoulder_lift_joint:
        trajectory: 0.2
        goal: 0.1
      elbow_joint:
        trajectory: 0.2
        goal: 0.1
      wrist_1_joint:
        trajectory: 0.2
        goal: 0.1
      wrist_2_joint:
        trajectory: 0.2
        goal: 0.1
      wrist_3_joint:
        trajectory: 0.2
        goal: 0.1
    
    gains:
      shoulder_pan_joint:
        p: 100.0
        i: 0.01
        d: 10.0
        i_clamp: 1.0
      shoulder_lift_joint:
        p: 100.0
        i: 0.01
        d: 10.0
        i_clamp: 1.0
      elbow_joint:
        p: 100.0
        i: 0.01
        d: 10.0
        i_clamp: 1.0
      wrist_1_joint:
        p: 50.0
        i: 0.01
        d: 5.0
        i_clamp: 1.0
      wrist_2_joint:
        p: 50.0
        i: 0.01
        d: 5.0
        i_clamp: 1.0
      wrist_3_joint:
        p: 50.0
        i: 0.01
        d: 5.0
        i_clamp: 1.0
